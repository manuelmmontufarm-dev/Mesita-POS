name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          API_KEY: test-api-key
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          APP_BASE_URL: http://localhost:3000
          MESITAQR_WEBHOOK_SECRET: test-webhook-secret

  # Railway auto-deploys from GitHub when connected — this job is informational only
  notify-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Notify
        run: echo "✅ Tests passed on main — Railway will auto-deploy."
